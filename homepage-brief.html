<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage Brief — MH Sitemap</title>
  <link rel="stylesheet" href="shared.css">
  <style>

    /* ── PERSONA ROUTING GRID ─────────────────────────────────────────────── */
    .routing-persona-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .routing-persona-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .rpc-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 14px 10px;
    }
    .rpc-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .rpc-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
    .rpc-role { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .rpc-section {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
    }
    .rpc-section.flex-grow { flex: 1; }
    .rpc-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-faint);
      display: block; margin-bottom: 5px;
    }
    .rpc-entry-val {
      display: inline-block; font-size: 11px; color: var(--text-2);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px; margin: 0 2px 3px 0;
    }
    .rpc-dest-row {
      display: flex; align-items: baseline; gap: 5px;
      font-size: 12px; margin-bottom: 4px; line-height: 1.3;
    }
    .rpc-arrow { color: var(--text-faint); flex-shrink: 0; font-size: 11px; }
    .rpc-dest-name { font-weight: 600; color: var(--text-2); }
    .rpc-conv {
      padding: 9px 14px;
      border-top: 1px solid var(--border);
    }
    .rpc-conv-action { font-size: 12px; font-weight: 700; }

    /* ── ABOVE-FOLD ITEMS ─────────────────────────────────────────────────── */
    .above-fold-item {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px; margin-bottom: 10px;
    }
    .fold-rank {
      width: 28px; height: 28px; border-radius: 99px;
      background: var(--brand); color: white;
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .fold-info { flex: 1; min-width: 0; }
    .fold-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .fold-url  { font-size: 12px; color: var(--text-faint); font-family: monospace; }
    .fold-personas { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .fold-score { font-size: 22px; font-weight: 700; text-align: right; flex-shrink: 0; }
    .fold-score.high   { color: var(--heat-high); }
    .fold-score.medium { color: var(--heat-med); }
    .fold-score-label  { font-size: 10px; color: var(--text-faint); text-align: right; }
    .fold-content-tags {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
    }
    .fold-content-tag {
      font-size: 10px; font-weight: 500;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px; color: var(--text-muted);
    }
    .fold-conv-tag {
      font-size: 10px; font-weight: 700;
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 4px; padding: 2px 7px; color: #1d4ed8;
    }

    /* ── CTA BOXES ────────────────────────────────────────────────────────── */
    /* (uses shared .cta-box styles) */

    /* ── EXCLUDED ─────────────────────────────────────────────────────────── */
    .excluded-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: var(--radius-sm);
      background: #f8f9fb; border: 1px solid var(--border); margin-bottom: 6px;
    }
    .excluded-score { font-size: 13px; font-weight: 700; color: var(--text-faint); width: 28px; flex-shrink: 0; }
    .excluded-name { font-size: 13px; color: var(--text-2); font-weight: 500; }
    .excluded-reason { font-size: 11px; color: var(--text-faint); margin-left: auto; }

    /* ── ROUTING INSIGHT ──────────────────────────────────────────────────── */
    .routing-insight {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px; margin-bottom: 10px;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .insight-num {
      width: 22px; height: 22px; border-radius: 99px;
      background: var(--bg); border: 1.5px solid var(--border);
      font-size: 11px; font-weight: 700; color: var(--brand);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
    }
    .insight-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .insight-desc  { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    /* ── RESPONSIVE ───────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .routing-grid { grid-template-columns: 1fr; }
      .routing-persona-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .routing-persona-grid { grid-template-columns: 1fr; }
      .above-fold-item { flex-wrap: wrap; gap: 10px; }
      .excluded-reason { display: none; }
    }
  </style>
</head>
<body>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>Homepage Routing Brief</h1>
  <p>Which pages to route each persona to, what to prioritize above the fold, and which pages don't earn homepage real estate.</p>
</div>

<!-- MAIN -->
<div class="container">
  <div id="content"></div>
</div>

<!-- DATA -->
<script src="data/personas.js"></script>
<script src="data/sitemap.js"></script>
<script src="data/user-stories.js"></script>
<script src="data/flows.js"></script>
<script src="data/heat-map.js"></script>
<script src="data/homepage-brief.js"></script>

<script>
  function getSitemapPage(pid) {
    return (SITEMAP.pages || []).find(p => p.id === pid);
  }

  function personaBadge(pid) {
    const p = (PERSONAS.personas || []).find(per => per.id === pid);
    if (!p) return '';
    return `<span class="badge" style="background:${p.colorLight};color:${p.color};border:1px solid ${p.color}40;font-size:11px">${p.icon} ${p.shortName}</span>`;
  }

  // ── Section 1: Per-persona routing map ──────────────────────────────────

  function renderPersonaRoutingMap() {
    const cards = PERSONAS.personas.map(persona => {
      const stories = USER_STORIES.userStories.filter(s => s.personaId === persona.id);
      const p1Stories = stories.filter(s => s.priority === 1);

      // Unique destination pages from priority-1 stories, excluding home
      const seen = new Set(['home']);
      const destPages = [];
      for (const story of p1Stories) {
        for (const pid of (story.pageIds || [])) {
          if (seen.has(pid)) continue;
          seen.add(pid);
          const sp = getSitemapPage(pid);
          if (sp && sp.type !== 'nav-dropdown' && sp.type !== 'nav-cta') {
            destPages.push(sp);
          }
        }
      }

      // Entry channels (deduplicated)
      const entries = [...new Set(
        p1Stories.map(s => s.entryChannel.split('/').map(e => e.trim())).flat()
      )];

      const entryHtml = entries.slice(0, 3).map(e =>
        `<span class="rpc-entry-val">${e}</span>`
      ).join('');

      const destHtml = destPages.slice(0, 4).map(p =>
        `<div class="rpc-dest-row">
          <span class="rpc-arrow">→</span>
          <span class="rpc-dest-name">${p.name}</span>
        </div>`
      ).join('');

      return `
        <div class="routing-persona-card" style="border-top:3px solid ${persona.color}">
          <div class="rpc-header">
            <span class="rpc-icon">${persona.icon}</span>
            <div>
              <div class="rpc-name" style="color:${persona.color}">${persona.shortName}</div>
              <div class="rpc-role">${persona.decisionRole}</div>
            </div>
          </div>
          <div class="rpc-section">
            <span class="rpc-label">Entry</span>
            ${entryHtml || '<span style="font-size:11px;color:var(--text-faint)">—</span>'}
          </div>
          <div class="rpc-section flex-grow">
            <span class="rpc-label">Send to</span>
            ${destHtml || '<span style="font-size:11px;color:var(--text-faint)">No priority-1 pages mapped</span>'}
          </div>
          <div class="rpc-conv rpc-section" style="background:${persona.colorLight}">
            <span class="rpc-label">Conversion goal</span>
            <span class="rpc-conv-action" style="color:${persona.color}">${persona.conversionAction}</span>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="section-title"><span class="num">1</span> Where to Route Each Persona</div>
      <p class="text-muted text-small mb-16">Primary destination pages for each audience based on their priority-1 jobs to be done. These are the pages the homepage needs to make reachable in one click.</p>
      <div class="routing-persona-grid">${cards}</div>`;
  }

  // ── Section 2: Above-the-fold priorities ────────────────────────────────

  function renderAboveFold() {
    const b = HOMEPAGE_BRIEF;
    if (!b.aboveTheFold || !b.aboveTheFold.length) {
      return `<p class="text-muted text-small" style="padding:12px 0">Generate heat map first to populate above-the-fold priorities.</p>`;
    }

    // Filter out home — it IS the homepage, it doesn't need to link to itself
    const pages = b.aboveTheFold.filter(p => p.pageId !== 'home');

    const items = pages.map((p, i) => {
      const sp = getSitemapPage(p.pageId);
      const pc = sp && sp.pageContent;
      const tagsHtml = pc && pc.keyContent && pc.keyContent.length
        ? `<div class="fold-content-tags">${pc.keyContent.map(t => `<span class="fold-content-tag">${t}</span>`).join('')}</div>` : '';
      const convHtml = pc && pc.conversionActions && pc.conversionActions.length
        ? `<div class="fold-content-tags">${pc.conversionActions.map(a => `<span class="fold-conv-tag">→ ${a}</span>`).join('')}</div>` : '';
      const personaBadges = (p.personasServed || []).map(personaBadge).join('');

      return `
        <div class="above-fold-item">
          <div class="fold-rank">${i + 1}</div>
          <div class="fold-info">
            <div class="fold-name">${p.pageName}</div>
            <div class="fold-url">${p.url || ''}</div>
            ${tagsHtml}
            ${convHtml}
            <div class="fold-personas">${personaBadges}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="fold-score ${p.heatLevel}">${p.heatScore}</div>
            <div class="fold-score-label">heat score</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="section-title mt-24"><span class="num">2</span> Pages That Earn Homepage Visibility</div>
      <p class="text-muted text-small mb-16">Ranked by heat score. These pages serve the most user stories across the most personas — they deserve direct access from the homepage.</p>
      ${items}`;
  }

  // ── Section 3: CTA hierarchy ─────────────────────────────────────────────

  function renderCTA(cta, isPrimary) {
    const persona = PERSONAS.personas.find(p => p.id === cta.personaId);
    const clsBox = isPrimary ? 'cta-box primary' : 'cta-box';
    const typeLbl = isPrimary ? 'Primary CTA' : 'Secondary CTA';
    return `
      <div class="${clsBox}">
        <div style="flex:1">
          <div class="cta-type">${typeLbl}${persona ? ' — ' + persona.shortName : ''}</div>
          <div class="cta-action">${cta.action}</div>
          <div class="cta-rationale">${cta.rationale}</div>
          <div class="cta-placement">📌 ${cta.placement}</div>
        </div>
        ${persona ? `<span class="badge" style="flex-shrink:0;background:${persona.colorLight};color:${persona.color};border:1px solid ${persona.color}40">${persona.icon} ${persona.role}</span>` : ''}
      </div>`;
  }

  function renderCTAHierarchy() {
    const b = HOMEPAGE_BRIEF;
    let html = `<div class="section-title mt-24"><span class="num">3</span> CTA Hierarchy</div>`;
    if (b.primaryCTA) {
      html += renderCTA(b.primaryCTA, true);
      (b.secondaryCTAs || []).forEach(cta => { html += renderCTA(cta, false); });
    }
    return html;
  }

  // ── Section 4: Excluded pages ────────────────────────────────────────────

  function renderExcluded() {
    const b = HOMEPAGE_BRIEF;
    if (!b.excludedFromHomepage || !b.excludedFromHomepage.length) return '';
    return `
      <div class="section-title mt-24"><span class="num">4</span> Pages That Don't Earn Homepage Real Estate</div>
      <p class="text-muted text-small mb-16">These pages scored too low to promote from the homepage. Reachable via navigation — just not worth a homepage slot.</p>
      ${b.excludedFromHomepage.map(p => `
        <div class="excluded-item">
          <span class="excluded-score">${p.heatScore}</span>
          <span class="excluded-name">${p.pageName}</span>
          <span class="excluded-reason">${p.reason}</span>
        </div>`).join('')}`;
  }

  // ── Main render ──────────────────────────────────────────────────────────

  function render() {
    const b = HOMEPAGE_BRIEF;
    if (!b || b.status !== 'generated') {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📄</div>
          <h3>Brief not yet generated</h3>
          <p>Run the pipeline first, then return here.</p>
          <code>npm run build</code>
        </div>`;
      return;
    }

    document.getElementById('content').innerHTML = `
      <div class="brief-principle">
        <div class="label">Core Design Principle</div>
        <p>${b.corePrinciple}</p>
      </div>
      ${renderPersonaRoutingMap()}
      ${renderAboveFold()}
      ${renderCTAHierarchy()}
      ${renderExcluded()}
    `;
  }

  render();
</script>
</body>
</html>
