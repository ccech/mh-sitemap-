<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Stories — MH Sitemap</title>
  <link rel="stylesheet" href="shared.css">
  <style>

    /* ── PERSONA GRID ────────────────────────────────────────────────────────── */
    .persona-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .persona-grid-section {
      display: contents;
    }
    .persona-card {
      display: flex; flex-direction: column;
      padding: 14px 16px 12px;
      background: var(--surface);
      cursor: pointer;
      border-top: 3px solid transparent;
      transition: background 0.12s, border-top-color 0.12s;
      position: relative;
      text-align: left;
      border: none;
      font-family: inherit;
    }
    .persona-card:hover {
      background: var(--bg);
      border-top-color: var(--pc-color);
    }
    .persona-card.active {
      background: color-mix(in srgb, var(--pc-color) 8%, white);
      border-top: 3px solid var(--pc-color);
    }
    .pc-icon  { font-size: 20px; line-height: 1; margin-bottom: 8px; }
    .pc-name  { font-size: 13px; font-weight: 700; line-height: 1.3; color: var(--text); }
    .persona-card.active .pc-name { color: var(--pc-color); }
    .pc-role  { font-size: 11px; color: var(--text-faint); margin-top: 2px; line-height: 1.3; }
    .pc-meta  {
      display: flex; align-items: center; gap: 5px;
      margin-top: 8px;
    }
    .pc-stories {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-faint);
    }
    .pc-gap-dot {
      width: 6px; height: 6px; border-radius: 99px;
      background: #f97316; flex-shrink: 0;
    }
    .pc-divider-label {
      grid-column: 1 / -1;
      background: var(--bg);
      padding: 5px 16px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-faint);
      border-top: 1px solid var(--border);
    }

    /* ── GAP BANNER ──────────────────────────────────────────────────────────── */
    .gap-banner {
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: var(--radius); padding: 0; margin-bottom: 20px; overflow: hidden;
    }
    .gap-banner-trigger {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; cursor: pointer;
      background: none; border: none; width: 100%; text-align: left; font-family: inherit;
    }
    .gap-banner-trigger:hover { background: rgba(249,115,22,0.05); }
    .gap-banner-title { font-size: 14px; font-weight: 700; color: #92400e; flex: 1; }
    .gap-banner-chevron { font-size: 13px; color: #c2763b; transition: transform 0.2s; }
    .gap-banner.open .gap-banner-chevron { transform: rotate(180deg); }
    .gap-banner-body { display: none; padding: 0 16px 12px; }
    .gap-banner.open .gap-banner-body { display: block; }
    .gap-banner-item {
      font-size: 13px; color: #78350f; margin-bottom: 5px;
      padding-left: 16px; position: relative; line-height: 1.5;
    }
    .gap-banner-item::before { content: '⚠'; position: absolute; left: 0; font-size: 11px; top: 1px; }

    /* ── STORY CARDS ROW ─────────────────────────────────────────────────────── */
    .story-cards-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .story-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 20px 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex; flex-direction: column; gap: 12px;
      position: relative;
    }
    .story-card:hover {
      border-color: var(--card-color);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--card-color) 12%, transparent);
    }
    .story-card.active {
      border-color: var(--card-color);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom-color: var(--surface);
      box-shadow: 2px 0 0 0 var(--card-color), -2px 0 0 0 var(--card-color);
      z-index: 2;
    }
    .sc-top {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .sc-num {
      width: 28px; height: 28px; border-radius: 99px;
      font-size: 13px; font-weight: 800; color: white;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sc-chips { display: flex; gap: 5px; align-items: center; }
    .sc-gap-dot {
      width: 8px; height: 8px; border-radius: 99px;
      background: #f97316; flex-shrink: 0; title: "Content gap";
    }
    .sc-jtbd {
      font-size: 14px; font-weight: 600; line-height: 1.4;
      color: var(--text); flex: 1;
    }
    .sc-bottom {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: 4px;
    }
    .sc-depth {
      font-size: 12px; color: var(--text-muted);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 99px; padding: 2px 10px;
    }
    .sc-caret {
      font-size: 14px; color: var(--text-faint);
      transition: transform 0.2s;
    }
    .story-card.active .sc-caret { transform: rotate(180deg); color: var(--card-color); }

    /* ── EXPAND PANEL ────────────────────────────────────────────────────────── */
    .story-expand-panel {
      display: none;
      background: var(--surface);
      border: 2px solid var(--panel-color, var(--border));
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }
    .story-expand-panel.open { display: block; }

    /* Header row */
    .expand-header {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 24px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .eh-jtbd {
      font-size: 16px; font-weight: 700; color: var(--text);
      line-height: 1.4; margin-bottom: 8px;
    }
    .eh-chips {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .eh-chip {
      font-size: 12px; color: var(--text-muted);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 99px; padding: 3px 10px; font-weight: 500;
    }
    .eh-source {
      font-size: 12px; color: var(--text-faint); font-style: italic;
      line-height: 1.5; margin-top: 10px;
    }
    .eh-right {
      display: flex; flex-direction: column; gap: 0;
    }
    .eh-persona-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .eh-persona-icon { font-size: 22px; flex-shrink: 0; }
    .eh-persona-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
    .eh-persona-role { font-size: 11px; color: var(--text-muted); }
    .eh-conv-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 99px;
      font-size: 12px; font-weight: 700; color: white;
      margin-top: 8px; width: 100%; justify-content: center;
    }

    /* Metrics row */
    .expand-metrics {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 16px;
    }
    .metric-block {
      flex: 1; border-left: 3px solid var(--panel-color);
      padding: 10px 14px;
      background: var(--bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .metric-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 5px;
    }
    .metric-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }
    .gap-block {
      flex: 1; border-left: 3px solid #f97316;
      padding: 10px 14px;
      background: #fff7ed; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .gap-block .metric-label { color: #92400e; }
    .gap-block .metric-text  { color: #78350f; }

    /* ── HORIZONTAL FLOW ─────────────────────────────────────────────────────── */
    .flow-area { padding: 20px 24px 28px; }
    .flow-area-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-faint); margin-bottom: 16px;
    }
    .flow-h {
      display: flex; align-items: flex-start; gap: 0;
      overflow-x: auto; padding-bottom: 8px;
    }
    .flow-h-step {
      display: flex; align-items: center; flex-shrink: 0;
    }
    .flow-h-node {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; width: 140px; flex-shrink: 0;
    }
    .flow-h-num {
      width: 24px; height: 24px; border-radius: 99px;
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px; border: 2px solid; flex-shrink: 0;
    }
    .flow-h-card {
      width: 100%; border: 2px solid; border-radius: var(--radius);
      padding: 10px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }
    .flow-h-name {
      font-size: 12px; font-weight: 700; line-height: 1.3; text-align: center;
    }
    .flow-h-url {
      font-size: 10px; font-family: monospace; opacity: 0.55;
      margin-top: 3px; text-align: center; word-break: break-all;
    }
    .flow-h-badge {
      font-size: 10px; font-weight: 800; padding: 2px 8px;
      border-radius: 99px; margin-top: 7px;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .flow-h-arrow {
      display: flex; align-items: flex-end;
      padding: 0 4px; padding-bottom: 42px;
      color: var(--text-faint); font-size: 18px; flex-shrink: 0;
    }

    /* Node type colour tokens */
    .fhn-entry .flow-h-num  { background: var(--bg); border-color: var(--border); color: var(--text-faint); }
    .fhn-entry .flow-h-card { background: var(--bg); border-color: var(--border); border-style: dashed; }
    .fhn-entry .flow-h-name { color: var(--text-muted); font-weight: 500; font-style: italic; }
    .fhn-entry .flow-h-badge { background: #f3f4f6; color: var(--text-faint); }

    .fhn-home .flow-h-num  { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
    .fhn-home .flow-h-card { background: #eff6ff; border-color: #93c5fd; }
    .fhn-home .flow-h-name { color: #1d4ed8; }
    .fhn-home .flow-h-badge { background: #dbeafe; color: #1d4ed8; }

    .fhn-high .flow-h-num  { background: var(--heat-high-bg); border-color: var(--heat-high-border); color: var(--heat-high); }
    .fhn-high .flow-h-card { background: var(--heat-high-bg); border-color: var(--heat-high-border); }
    .fhn-high .flow-h-name { color: var(--heat-high); }
    .fhn-high .flow-h-badge { background: var(--heat-high); color: white; }

    .fhn-medium .flow-h-num  { background: var(--heat-med-bg); border-color: var(--heat-med-border); color: var(--heat-med); }
    .fhn-medium .flow-h-card { background: var(--heat-med-bg); border-color: var(--heat-med-border); }
    .fhn-medium .flow-h-name { color: var(--heat-med); }
    .fhn-medium .flow-h-badge { background: var(--heat-med); color: white; }

    .fhn-low .flow-h-num  { background: var(--heat-low-bg); border-color: var(--heat-low-border); color: var(--heat-low); }
    .fhn-low .flow-h-card { background: var(--heat-low-bg); border-color: var(--heat-low-border); }
    .fhn-low .flow-h-name { color: var(--heat-low); }
    .fhn-low .flow-h-badge { background: var(--heat-low); color: white; }


    /* ── FLOWS LAYOUT ────────────────────────────────────────────────────────── */
    .flows-layout {
      display: grid;
      grid-template-columns: 256px 1fr;
      gap: 20px;
      align-items: start;
    }
    .flows-main { min-width: 0; }

    /* ── PERSONA SIDEBAR ─────────────────────────────────────────────────────── */
    .persona-sidebar {
      position: sticky;
      top: 72px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      font-size: 13px;
    }
    .psb-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .psb-icon-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .psb-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
    .psb-name { font-size: 15px; font-weight: 800; line-height: 1.2; }
    .psb-role { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .psb-power {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 99px; margin-top: 4px;
    }

    .psb-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .psb-section:last-child { border-bottom: none; }
    .psb-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-faint); margin-bottom: 7px;
      display: block;
    }

    .psb-statement {
      font-size: 12px; font-style: italic; line-height: 1.6;
      color: var(--text-2); border-left: 3px solid;
      padding-left: 9px;
    }

    .psb-conv {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: var(--radius);
      font-size: 12px; font-weight: 700; color: white;
    }

    .psb-pain-item {
      display: flex; align-items: flex-start; gap: 6px;
      font-size: 12px; color: var(--text-2); line-height: 1.4;
      margin-bottom: 6px;
    }
    .psb-pain-item:last-child { margin-bottom: 0; }
    .psb-pain-dot {
      width: 5px; height: 5px; border-radius: 99px;
      background: var(--psb-color, var(--text-faint));
      flex-shrink: 0; margin-top: 5px;
    }

    .psb-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .psb-chip {
      font-size: 11px; font-weight: 500;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 99px; padding: 2px 8px; color: var(--text-muted);
    }

    .psb-empty {
      padding: 32px 16px; text-align: center;
      font-size: 13px; color: var(--text-faint); font-style: italic;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
    @media (max-width: 1100px) {
      .flows-layout { grid-template-columns: 220px 1fr; }
    }
    @media (max-width: 900px) {
      .persona-grid { grid-template-columns: repeat(3, 1fr); }
      .path-legend { padding: 10px 16px; }
      .flows-layout { grid-template-columns: 1fr; }
      .persona-sidebar { position: static; display: none; }
      .story-cards-row { grid-template-columns: 1fr 1fr; }
      .expand-header { grid-template-columns: 1fr; }
      .eh-right { display: none; }
      .expand-metrics { flex-direction: column; }
    }
    @media (max-width: 600px) {
      .story-cards-row { grid-template-columns: 1fr; }
      .story-card.active { border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg); border-bottom-color: var(--card-color); box-shadow: none; }
    }
  </style>
</head>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>User Flows</h1>
  <p>3 jobs to be done per persona. Select a persona, then click a story card to trace its site path.</p>
</div>

<!-- PERSONA GRID -->
<div class="persona-grid" id="persona-selector"></div>


<!-- MAIN -->
<div class="container">
  <div id="gap-banner-area"></div>
  <div class="flows-layout">
    <aside class="persona-sidebar" id="persona-sidebar">
      <div class="psb-empty">Select a persona to see details</div>
    </aside>
    <div class="flows-main">
      <div class="story-cards-row" id="story-cards-row"></div>
      <div class="story-expand-panel" id="story-expand"></div>
    </div>
  </div>
</div>

<!-- DATA -->
<script src="data/personas.js"></script>
<script src="data/user-stories.js"></script>
<script src="data/sitemap.js"></script>
<script src="data/flows.js"></script>
<script src="data/heat-map.js"></script>

<script>
  let activePersonaId = null;
  let activeStoryId   = null;

  // ── helpers ───────────────────────────────────────────────────────────────

  function allPersonas() {
    return [...(PERSONAS.personas || []), ...(PERSONAS.secondaryAudiences || [])];
  }
  function getPersona(id) {
    return allPersonas().find(p => p.id === id);
  }
  function getHeatPage(pid)    { return (HEAT_MAP.pages || []).find(p => p.id === pid) || null; }
  function getSitemapPage(pid) { return (SITEMAP.pages || []).find(p => p.id === pid) || null; }
  function getFlowPath(storyId, personaId) {
    const flow = (FLOWS.flows || []).find(f => f.personaId === personaId);
    return flow ? (flow.paths || []).find(p => p.storyId === storyId) : null;
  }
  function storiesForPersona(pid) {
    return USER_STORIES.userStories.filter(s => s.personaId === pid);
  }
  function priorityLabel(n) {
    return { 1: 'Must Have', 2: 'High', 3: 'Medium', 4: 'Low' }[n] || n;
  }
  function hex2rgba(hex, a) {
    if (!hex || hex.length < 7) return `rgba(0,0,0,${a})`;
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // ── persona selector ───────────────────────────────────────────────────────

  function buildPersonaSelector() {
    const buying    = PERSONAS.personas || [];
    const secondary = PERSONAS.secondaryAudiences || [];

    function card(p) {
      const stories  = storiesForPersona(p.id);
      if (!stories.length) return '';
      const gaps     = stories.filter(s => s.contentGapNote).length;
      const isActive = p.id === activePersonaId;
      const color    = p.color || '#6b7280';
      return `
        <button class="persona-card${isActive ? ' active' : ''}"
          style="--pc-color:${color}"
          onclick="selectPersona('${p.id}')">
          <div class="pc-icon">${p.icon || ''}</div>
          <div class="pc-name">${p.shortName || p.name}</div>
          <div class="pc-role">${p.role || ''}</div>
          <div class="pc-meta">
            <span class="pc-stories">${stories.length} stories</span>
            ${gaps ? `<span class="pc-gap-dot" title="${gaps} gap${gaps > 1 ? 's' : ''}"></span>` : ''}
          </div>
        </button>`;
    }

    const buyingHtml    = buying.map(card).join('');
    const secondaryHtml = secondary.map(card).filter(Boolean).join('');

    document.getElementById('persona-selector').innerHTML =
      buyingHtml +
      (secondaryHtml ? `<div class="pc-divider-label">Secondary audiences</div>${secondaryHtml}` : '');
  }

  // ── story cards ────────────────────────────────────────────────────────────

  function buildStoryCards() {
    const persona = getPersona(activePersonaId);
    if (!persona) { document.getElementById('story-cards-row').innerHTML = ''; return; }
    const stories = storiesForPersona(activePersonaId);
    const color = persona.color || '#6b7280';

    const html = stories.map((story, i) => {
      const flowPath = getFlowPath(story.id, activePersonaId);
      const depth = flowPath ? flowPath.clickDepth : '?';
      const isActive = story.id === activeStoryId;
      const pCls = story.priority === 1 ? 'p1' : 'p2';
      const hasGap = !!story.contentGapNote;

      return `
        <div class="story-card${isActive ? ' active' : ''}"
          style="--card-color:${color}"
          onclick="toggleStory('${story.id}')">
          <div class="sc-top">
            <span class="sc-num" style="background:${color}">${i + 1}</span>
            <div class="sc-chips">
              <span class="priority-chip ${pCls}">P${story.priority} · ${priorityLabel(story.priority)}</span>
              ${hasGap ? '<span class="sc-gap-dot" title="Content gap flagged"></span>' : ''}
            </div>
          </div>
          <div class="sc-jtbd">${story.jobToBeDone}</div>
          <div class="sc-bottom">
            <span class="sc-depth">⇢ ${depth} click${depth !== 1 ? 's' : ''} to conversion</span>
            <span class="sc-caret">${isActive ? '▴' : '▾'}</span>
          </div>
        </div>`;
    }).join('');

    document.getElementById('story-cards-row').innerHTML = html;
  }

  // ── horizontal flow diagram ────────────────────────────────────────────────

  function buildHorizontalFlow(story, persona) {
    const flowPath = getFlowPath(story.id, persona.id);
    const color = persona.color || '#6b7280';

    if (!flowPath || !flowPath.path || !flowPath.path.length) {
      return `<div style="font-size:13px;color:var(--text-faint);font-style:italic;padding:12px 0">Path not yet resolved.</div>`;
    }

    const steps = [];

    // Entry node
    steps.push({
      type: 'entry',
      name: story.entryChannel.split('/')[0].trim(),
      url: '',
      badge: 'Entry',
      num: 0,
      pageId: null
    });

    // Page nodes
    flowPath.path.forEach((pg, i) => {
      const isFirst = i === 0;
      const isLast  = i === flowPath.path.length - 1;
      const hp    = getHeatPage(pg.id);
      const level = hp ? hp.heatLevel : 'low';
      const score = hp ? hp.heatScore.toFixed(1) : '–';

      let type, badge, nodeStyle = '', numStyle = '', nameStyle = '', badgeStyle = '';

      if (isFirst) {
        type = 'home'; badge = 'Homepage';
      } else if (isLast) {
        type = 'conversion'; badge = 'Conversion';
        nodeStyle = `style="background:${hex2rgba(color,0.08)};border-color:${color}"`;
        numStyle  = `style="background:${color};border-color:${color};color:white"`;
        nameStyle = `style="color:${color}"`;
        badgeStyle = `style="background:${color};color:white"`;
      } else {
        type = level; badge = score + ' heat';
      }

      steps.push({ type, name: pg.name, url: pg.url, badge, num: i + 1, nodeStyle, numStyle, nameStyle, badgeStyle, pageId: pg.id });
    });

    const nodesHtml = steps.map((step, i) => {
      const sp = step.pageId ? getSitemapPage(step.pageId) : null;

      const numHtml = step.type === 'conversion'
        ? `<div class="flow-h-num" ${step.numStyle}>${step.num}</div>`
        : `<div class="flow-h-num">${step.num}</div>`;

      const arrow = i < steps.length - 1
        ? `<div class="flow-h-arrow">→</div>` : '';

      return `
        <div class="flow-h-step">
          <div class="flow-h-node fhn-${step.type}">
            ${numHtml}
            <div class="flow-h-card" ${step.nodeStyle || ''}>
              <div class="flow-h-name" ${step.nameStyle || ''}>${step.name}</div>
              ${step.url ? `<div class="flow-h-url">${step.url}</div>` : ''}
              <div class="flow-h-badge" ${step.badgeStyle || ''}>${step.badge}</div>
            </div>
          </div>
          ${arrow}
        </div>`;
    }).join('');

    return `<div class="flow-h">${nodesHtml}</div>`;
  }

  // ── expand panel ───────────────────────────────────────────────────────────

  function buildExpandPanel() {
    const story   = USER_STORIES.userStories.find(s => s.id === activeStoryId);
    const persona = story ? getPersona(story.personaId) : null;
    const panel   = document.getElementById('story-expand');

    if (!story || !persona) {
      panel.innerHTML = '';
      panel.classList.remove('open');
      panel.style.removeProperty('--panel-color');
      return;
    }

    const color = persona.color || '#6b7280';
    const colorLight = persona.colorLight || '#f3f4f6';
    const pCls  = story.priority === 1 ? 'p1' : 'p2';
    const flowPath = getFlowPath(story.id, persona.id);
    const depth = flowPath ? flowPath.clickDepth : '?';

    const gapBlock = story.contentGapNote ? `
      <div class="gap-block">
        <div class="metric-label">⚠ Content gap</div>
        <div class="metric-text">${story.contentGapNote}</div>
      </div>` : '';

    panel.style.setProperty('--panel-color', color);
    panel.innerHTML = `

      <!-- Header -->
      <div class="expand-header">
        <div>
          <div class="eh-jtbd">${story.jobToBeDone}</div>
          <div class="eh-chips">
            <span class="eh-chip">Entry: ${story.entryChannel}</span>
            <span class="priority-chip ${pCls}">P${story.priority} · ${priorityLabel(story.priority)}</span>
            <span class="eh-chip">⇢ ${depth} click${depth !== 1 ? 's' : ''} to conversion</span>
          </div>
          <div class="eh-source">${story.jobSource}</div>
        </div>
        <div class="eh-right">
          <div class="eh-persona-row" style="border-color:${color}30">
            <span class="eh-persona-icon">${persona.icon || ''}</span>
            <div>
              <div class="eh-persona-name" style="color:${color}">${persona.name}</div>
              <div class="eh-persona-role">${persona.role || ''}</div>
            </div>
          </div>
          <div class="eh-conv-pill" style="background:${color}">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M4 6l1.5 1.5L8 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            ${persona.conversionAction || ''}
          </div>
        </div>
      </div>

      <!-- Metrics -->
      <div class="expand-metrics">
        <div class="metric-block" style="border-left-color:${color}">
          <div class="metric-label" style="color:${color}">Success metric</div>
          <div class="metric-text">${story.successMetric}</div>
        </div>
        ${gapBlock}
      </div>

      <!-- Horizontal flow -->
      <div class="flow-area">
        <div class="flow-area-label">Site path</div>
        ${buildHorizontalFlow(story, persona)}
      </div>`;

    panel.classList.add('open');
  }

  // ── gap banner ─────────────────────────────────────────────────────────────

  function toggleGapBanner() {
    document.getElementById('gap-banner').classList.toggle('open');
  }

  function renderGapBanner() {
    const gapStories = USER_STORIES.userStories.filter(s => s.contentGapNote);
    if (!gapStories.length) { document.getElementById('gap-banner-area').innerHTML = ''; return; }
    const items = gapStories.map(s => {
      const p = getPersona(s.personaId);
      const idx = storiesForPersona(s.personaId).findIndex(st => st.id === s.id) + 1;
      const note = s.contentGapNote.replace(/^(GAP|NOTE): /, '');
      return `<div class="gap-banner-item"><strong>${p ? p.shortName || p.name : s.personaId} · Story ${idx}:</strong> ${note}</div>`;
    }).join('');
    document.getElementById('gap-banner-area').innerHTML = `
      <div class="gap-banner" id="gap-banner">
        <button class="gap-banner-trigger" onclick="toggleGapBanner()">
          <span style="font-size:15px">⚠️</span>
          <span class="gap-banner-title">${gapStories.length} Content Gaps Across User Stories</span>
          <span class="gap-banner-chevron">▾</span>
        </button>
        <div class="gap-banner-body">${items}</div>
      </div>`;
  }

  // ── persona sidebar ────────────────────────────────────────────────────────

  function buildPersonaSidebar() {
    const persona  = getPersona(activePersonaId);
    const sidebar  = document.getElementById('persona-sidebar');
    if (!persona) {
      sidebar.innerHTML = '<div class="psb-empty">Select a persona to see details</div>';
      return;
    }

    const color      = persona.color || '#6b7280';
    const colorLight = persona.colorLight || '#f3f4f6';

    // Pain points — up to 3
    const pains = (persona.painPoints || []).slice(0, 3).map(p =>
      `<div class="psb-pain-item">
        <span class="psb-pain-dot" style="background:${color}"></span>
        <span>${p}</span>
      </div>`
    ).join('');

    // Entry points as chips
    const entryChips = (persona.entryPoints || []).map(e =>
      `<span class="psb-chip">${e}</span>`
    ).join('');

    // Anxieties as chips
    const anxietyChips = (persona.anxieties || []).map(a =>
      `<span class="psb-chip">${a}</span>`
    ).join('');

    // Success criteria — up to 3
    const successItems = (persona.successCriteria || []).slice(0, 3).map(s =>
      `<div class="psb-pain-item">
        <span class="psb-pain-dot" style="background:#16a34a"></span>
        <span>${s}</span>
      </div>`
    ).join('');

    sidebar.style.setProperty('--psb-color', color);
    sidebar.innerHTML = `

      <!-- Header -->
      <div class="psb-header" style="border-top:4px solid ${color}">
        <div class="psb-icon-row">
          <span class="psb-icon">${persona.icon || ''}</span>
          <div>
            <div class="psb-name" style="color:${color}">${persona.name}</div>
            <div class="psb-role">${persona.jtbdPersona || persona.role || ''}</div>
          </div>
        </div>
        <span class="psb-power" style="background:${colorLight};color:${color};border:1px solid ${color}40">
          ${persona.decisionPower || ''}
        </span>
      </div>

      <!-- Job statement -->
      ${persona.jobStatement ? `
      <div class="psb-section">
        <span class="psb-label">Job to be done</span>
        <div class="psb-statement" style="border-left-color:${color}">"${persona.jobStatement}"</div>
      </div>` : ''}

      <!-- Conversion goal -->
      ${persona.conversionAction ? `
      <div class="psb-section">
        <span class="psb-label">Conversion goal</span>
        <div class="psb-conv" style="background:${color}">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4 6l1.5 1.5L8 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          ${persona.conversionAction}
        </div>
      </div>` : ''}

      <!-- Pain points -->
      ${pains ? `
      <div class="psb-section">
        <span class="psb-label">Pain points</span>
        ${pains}
      </div>` : ''}

      <!-- Success on site -->
      ${successItems ? `
      <div class="psb-section">
        <span class="psb-label">Success criteria</span>
        ${successItems}
      </div>` : ''}

      <!-- Entry points -->
      ${entryChips ? `
      <div class="psb-section">
        <span class="psb-label">Entry channels</span>
        <div class="psb-chips">${entryChips}</div>
      </div>` : ''}

      <!-- Anxieties -->
      ${anxietyChips ? `
      <div class="psb-section">
        <span class="psb-label">Anxieties</span>
        <div class="psb-chips">${anxietyChips}</div>
      </div>` : ''}`;
  }

  // ── interactions ───────────────────────────────────────────────────────────

  function selectPersona(personaId) {
    activePersonaId = personaId;
    activeStoryId   = null;
    buildPersonaSelector();
    buildPersonaSidebar();
    buildStoryCards();
    const panel = document.getElementById('story-expand');
    panel.innerHTML = '';
    panel.classList.remove('open');
    panel.style.removeProperty('--panel-color');
  }

  function toggleStory(storyId) {
    if (activeStoryId === storyId) {
      activeStoryId = null;
      buildStoryCards();
      const panel = document.getElementById('story-expand');
      panel.innerHTML = '';
      panel.classList.remove('open');
      panel.style.removeProperty('--panel-color');
    } else {
      activeStoryId = storyId;
      buildStoryCards();
      buildExpandPanel();
      // Scroll panel into view smoothly
      setTimeout(() => {
        document.getElementById('story-expand').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }
  }

  // ── init ───────────────────────────────────────────────────────────────────

  renderGapBanner();
  const firstPersona = allPersonas().find(p => storiesForPersona(p.id).length > 0);
  if (firstPersona) selectPersona(firstPersona.id);
</script>
</body>
</html>
