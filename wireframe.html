<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe — MH Sitemap</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── WIREFRAME VIEW ── */
    body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    .wf-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── LEFT SIDEBAR ── */
    .wf-sidebar {
      width: 268px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Journey panel */
    .jp-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px 8px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-faint);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .jp-toggle {
      border: none; background: none; cursor: pointer;
      font-size: 11px; color: var(--text-faint); padding: 2px 4px;
      transition: transform 0.2s;
    }
    .jp-toggle.collapsed { transform: rotate(180deg); }
    .jp-body { padding: 10px 12px 12px; }

    .persona-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .persona-pill-wf {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 500; cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text-2);
      transition: all 0.15s;
    }
    .persona-pill-wf:hover { border-color: currentColor; }

    .story-tabs { margin-top: 10px; display: flex; flex-direction: column; gap: 2px; }
    .story-tab-wf {
      width: 100%; text-align: left; padding: 7px 10px;
      border-radius: var(--radius-sm); border: none;
      background: none; cursor: pointer; font-size: 12px;
      color: var(--text-2); line-height: 1.4;
      border-left: 3px solid transparent;
      transition: all 0.12s; font-family: inherit;
    }
    .story-tab-wf:hover { background: var(--bg); }
    .story-tab-wf.active { background: var(--brand-light); border-left-color: var(--brand); color: var(--brand-dark); font-weight: 500; }
    .story-tab-num { font-size: 10px; font-weight: 700; color: var(--text-faint); margin-right: 4px; }

    .step-nav {
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 7px 10px;
      background: var(--bg); border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .step-nav-btn {
      border: none; background: none; cursor: pointer;
      color: var(--text-muted); font-size: 15px; padding: 2px 6px;
      border-radius: var(--radius-sm); transition: all 0.15s; line-height: 1;
    }
    .step-nav-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
    .step-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #step-info { font-size: 11px; color: var(--text-2); font-weight: 500; text-align: center; flex: 1; line-height: 1.3; }
    .exit-journey {
      display: block; margin-top: 8px; width: 100%;
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: var(--text-faint);
      text-decoration: underline; padding: 4px; font-family: inherit;
    }
    .exit-journey:hover { color: var(--text-muted); }

    /* Tree nav */
    .sidebar-divider { height: 1px; background: var(--border); flex-shrink: 0; }
    .tree-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .tree-header {
      padding: 10px 14px 7px; flex-shrink: 0;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-faint);
    }
    .tree-nav { list-style: none; overflow-y: auto; flex: 1; padding: 4px 0 12px; }
    .tree-section-header {
      padding: 8px 14px 3px; list-style: none;
      font-size: 10px; font-weight: 700; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-top: 6px; cursor: default;
    }
    .tree-node-btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; text-align: left; border: none; background: none;
      cursor: pointer; padding: 5px 14px;
      font-size: 12.5px; color: var(--text-2);
      transition: background 0.1s, color 0.1s; line-height: 1.3;
      font-family: inherit;
    }
    .tree-node-btn:hover { background: var(--bg); color: var(--text); }
    .tree-node-btn.active { background: var(--brand-light); color: var(--brand-dark); font-weight: 600; }
    .tree-cta-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      background: #f3f4f6; color: var(--text-faint); flex-shrink: 0;
      border: 1px solid var(--border); border-radius: 99px; padding: 1px 5px;
    }

    /* Journey tree highlighting */
    .journey-active .tree-node-btn:not(.journey-member):not(.journey-current) { opacity: 0.35; }
    .journey-active .tree-section-header { opacity: 0.35; }
    .tree-node-btn.journey-member { background: var(--brand-light); color: var(--brand-dark); }
    .tree-node-btn.journey-current { background: var(--brand) !important; color: white !important; font-weight: 600; }

    /* ── CENTER PANEL ── */
    .wf-center {
      flex: 1; overflow-y: auto;
      background: #eaecf0; padding: 24px 28px;
    }

    /* ── RIGHT META PANEL ── */
    .wf-meta {
      width: 256px; flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto; padding: 18px 16px;
    }
    .wf-meta-page-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
    .wf-meta-url { font-size: 11px; font-family: monospace; color: var(--text-faint); margin-bottom: 10px; }
    .wf-meta-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .wf-meta-tier { font-size: 11px; color: var(--text-faint); }
    .wf-heat-score { font-size: 20px; font-weight: 700; line-height: 1; }
    .wf-heat-score.high   { color: var(--heat-high); }
    .wf-heat-score.medium { color: var(--heat-med); }
    .wf-heat-score.low    { color: var(--heat-low); }
    .wf-meta-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
    .wf-meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 7px; font-weight: 700; }
    .wf-meta-purpose { font-size: 12px; color: var(--text-muted); font-style: italic; line-height: 1.6; }
    .wf-persona-pills-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .wf-persona-pip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 7px; border-radius: 99px; font-size: 11px; font-weight: 500;
    }
    .wf-tone-note {
      border-left: 3px solid #f59e0b; padding: 8px 10px;
      background: #fffbeb; border-radius: 0 4px 4px 0;
      font-size: 12px; color: #92400e; line-height: 1.5;
    }
    .wf-meta-crosslink {
      display: flex; align-items: flex-start; gap: 4px; padding: 4px 0;
      font-size: 12px; color: var(--brand); cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
      font-family: inherit; line-height: 1.3;
    }
    .wf-meta-crosslink:hover { text-decoration: underline; }
    .wf-meta-crosslink-ctx { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
    .wf-meta-cluster-row {
      font-size: 12px; color: var(--text-2); padding: 4px 0;
      display: flex; align-items: center; gap: 5px; cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
      font-family: inherit;
    }
    .wf-meta-cluster-row:hover { color: var(--brand); }
    .wf-journey-box {
      background: var(--brand-light); border-radius: var(--radius-sm);
      padding: 10px; margin-bottom: 4px;
    }
    .wf-journey-box .wf-meta-label { color: var(--brand-dark); }
    .wf-journey-jtbd-text { font-size: 12px; color: var(--brand-dark); font-style: italic; line-height: 1.5; margin-bottom: 8px; }
    .wf-journey-prevnext { display: flex; flex-direction: column; gap: 4px; }
    .wf-journey-link {
      font-size: 12px; color: var(--brand); cursor: pointer;
      border: none; background: none; text-align: left; padding: 3px 0;
      font-family: inherit;
    }
    .wf-journey-link:hover { text-decoration: underline; }

    /* ── WIREFRAME SHELL ── */
    .wireframe-shell {
      background: white; max-width: 840px; margin: 0 auto 40px;
      border-radius: var(--radius-lg); box-shadow: var(--shadow);
      overflow: hidden; border: 1px solid var(--border);
    }

    /* Journey banner */
    .wf-journey-banner {
      padding: 10px 20px; border-left: 5px solid;
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      font-size: 12px; color: inherit;
    }
    .wf-journey-banner-persona { font-weight: 700; font-size: 13px; }
    .wf-journey-banner-step {
      background: rgba(0,0,0,0.12); border-radius: 99px;
      padding: 2px 8px; font-weight: 600; font-size: 11px; white-space: nowrap;
    }
    .wf-journey-banner-jtbd { flex: 1; opacity: 0.8; min-width: 200px; font-style: italic; }
    .wf-journey-banner-nav { display: flex; gap: 6px; flex-shrink: 0; }
    .wf-journey-banner-nav button {
      background: rgba(0,0,0,0.12); border: none; cursor: pointer;
      padding: 4px 10px; border-radius: 4px; font-size: 11px;
      font-weight: 500; font-family: inherit; transition: background 0.1s;
    }
    .wf-journey-banner-nav button:hover { background: rgba(0,0,0,0.22); }
    .wf-journey-banner-nav button:disabled { opacity: 0.4; cursor: default; }

    /* Chrome bar */
    .wf-chrome {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; background: #f4f5f7;
      border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap;
    }
    .wf-breadcrumb { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .wf-breadcrumb button {
      background: none; border: none; cursor: pointer;
      color: var(--brand); font-size: 12px; padding: 0;
      text-decoration: underline; font-family: inherit;
    }
    .wf-breadcrumb .sep { color: var(--text-faint); font-size: 12px; }
    .wf-breadcrumb .crumb-current { font-size: 12px; color: var(--text-2); font-weight: 500; }
    .wf-url-chip {
      font-family: monospace; font-size: 11px; color: var(--text-faint);
      background: white; border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 99px; white-space: nowrap;
    }

    /* Simulated nav strip */
    .wf-nav-strip {
      display: flex; align-items: center; padding: 10px 22px;
      gap: 20px; border-bottom: 1px solid var(--border); background: white;
    }
    .wf-nav-logo { width: 80px; height: 16px; background: #d1d5db; border-radius: 3px; flex-shrink: 0; }
    .wf-nav-items { display: flex; gap: 16px; flex: 1; }
    .wf-nav-item-btn {
      font-size: 12px; color: var(--text-muted); cursor: pointer;
      border: none; background: none; padding: 0; font-family: inherit;
      transition: color 0.1s;
    }
    .wf-nav-item-btn:hover { color: var(--text); }
    .wf-nav-ctas-row { display: flex; gap: 6px; flex-shrink: 0; }
    .wf-btn {
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
      cursor: pointer; padding: 5px 12px; border: none;
      font-family: inherit; transition: all 0.15s; line-height: 1.4;
    }
    .wf-btn-primary { background: var(--brand); color: white; }
    .wf-btn-primary:hover { background: var(--brand-dark); }
    .wf-btn-ghost { background: none; border: 1.5px solid var(--border); color: var(--text-2); }
    .wf-btn-ghost:hover { border-color: var(--brand); color: var(--brand); }
    .wf-cta-btn { padding: 9px 18px; font-size: 13px; }

    /* Section container */
    .wf-section { padding: 22px 26px; border-bottom: 1px solid var(--border); }
    .wf-section:last-child { border-bottom: none; }
    .wf-section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-faint); margin-bottom: 12px; font-weight: 700;
    }

    /* Placeholder shapes */
    .wf-ph { background: #e5e7eb; border-radius: 4px; }
    .wf-ph-round { border-radius: 99px; }
    .wf-heading-ph { height: 26px; width: 70%; }
    .wf-subheading-ph { height: 18px; width: 55%; }
    .wf-text-ph { height: 12px; }
    .wf-text-ph-lg { height: 16px; }
    .wf-text-ph-sm { height: 10px; }
    .wf-text-line { height: 11px; background: #eaedf0; border-radius: 99px; margin-bottom: 6px; }
    .wf-img-ph { background: #e5e7eb; border-radius: 8px; aspect-ratio: 4/3; width: 100%; }
    .wf-img-ph-wide { aspect-ratio: 16/9; }

    /* Hero */
    .wf-hero { display: flex; gap: 28px; align-items: flex-start; }
    .wf-hero-body { flex: 1; }
    .wf-hero-img-col { flex-shrink: 0; width: 220px; }
    .wf-purpose-text { font-size: 12px; color: var(--text-muted); font-style: italic; margin-bottom: 14px; line-height: 1.6; padding: 8px 10px; background: #f8f9fb; border-left: 3px solid #e5e7eb; border-radius: 0 4px 4px 0; }
    .wf-ph-stack { display: flex; flex-direction: column; gap: 6px; }

    /* Content blocks */
    .wf-content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .wf-content-block { padding: 13px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .wf-content-icon { width: 26px; height: 26px; background: #e5e7eb; border-radius: 5px; margin-bottom: 9px; }
    .wf-content-label { font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 8px; line-height: 1.4; }

    /* Cross-links */
    .wf-crosslink-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .wf-crosslink-card {
      width: 100%; text-align: left; padding: 11px 13px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s; font-family: inherit;
    }
    .wf-crosslink-card:hover { border-color: var(--brand); box-shadow: var(--shadow-sm); }
    .wf-crosslink-dest { font-size: 12px; font-weight: 600; color: var(--brand); margin-bottom: 4px; }
    .wf-crosslink-context { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    /* CTA buttons */
    .wf-cta-row { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Cluster CTAs */
    .wf-cluster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .wf-cluster-card {
      width: 100%; text-align: left; padding: 13px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: border-color 0.15s; font-family: inherit;
    }
    .wf-cluster-card:hover { border-color: var(--brand); }
    .wf-cluster-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; line-height: 1.4; }
    .wf-cluster-dest { font-size: 12px; font-weight: 600; color: var(--brand); }

    /* Nav dropdown template */
    .wf-nav-dropdown-note {
      font-size: 13px; color: #92400e; padding: 10px 14px;
      background: #fffbeb; border-radius: var(--radius-sm);
      border: 1px solid #fde68a; margin-bottom: 16px;
    }
    .wf-dropdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .wf-dropdown-child {
      width: 100%; text-align: left; padding: 13px 15px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s; font-family: inherit;
    }
    .wf-dropdown-child:hover { border-color: var(--brand); box-shadow: var(--shadow-sm); }
    .wf-dropdown-child-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .wf-dropdown-child-url { font-size: 11px; font-family: monospace; color: var(--text-faint); margin-bottom: 7px; }
    .wf-dropdown-child-purpose { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

    /* Form / CTA page template */
    .wf-form-wrap { max-width: 440px; margin: 0 auto; }
    .wf-form-field { height: 38px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; }
    .wf-form-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }

    /* Home persona routing */
    .wf-persona-routing { display: grid; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 8px; margin-top: 16px; }
    .wf-persona-route-chip {
      display: flex; flex-direction: column; align-items: center;
      padding: 11px 8px; border-radius: var(--radius-sm);
      border: 1.5px solid; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      font-family: inherit; background: white; text-align: center;
    }
    .wf-persona-route-chip:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .wf-persona-route-icon { font-size: 18px; margin-bottom: 5px; }
    .wf-persona-route-name { font-size: 10px; font-weight: 600; line-height: 1.3; }
    .wf-persona-route-cta { font-size: 10px; opacity: 0.7; margin-top: 2px; }

    /* Detail / slug page */
    .wf-detail-content { display: flex; flex-direction: column; gap: 14px; }
    .wf-detail-block { padding: 13px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }

    /* Footer strip */
    .wf-footer { padding: 16px 26px; background: #f3f4f6; }
    .wf-footer-bar { height: 4px; background: #d1d5db; border-radius: 99px; }

    /* No-content note */
    .wf-no-content { font-size: 13px; color: var(--text-faint); font-style: italic; padding: 20px 0; text-align: center; }
  </style>
</head>

<div class="wf-layout">

  <!-- ── LEFT SIDEBAR ── -->
  <aside class="wf-sidebar">

    <!-- Journey panel -->
    <div>
      <div class="jp-header">
        <span>Follow a Journey</span>
        <button class="jp-toggle" id="jp-toggle" onclick="toggleJourneyPanel()">▲</button>
      </div>
      <div id="jp-body" class="jp-body">
        <div class="persona-pills" id="persona-pills"></div>

      </div>

    <div class="sidebar-divider"></div>

    <!-- Sitemap tree -->
    <div class="tree-panel">
      <div class="tree-header">All Pages</div>
      <ul class="tree-nav" id="tree-nav"></ul>
    </div>

  </aside>

  <!-- ── CENTER PANEL ── -->
  <main class="wf-center" id="wf-center">
    <div id="wf-frame"></div>
  </main>

  <!-- ── RIGHT META PANEL ── -->
  <aside class="wf-meta" id="wf-meta"></aside>

</div>

<script src="data/personas.js"></script>
<script src="data/sitemap.js"></script>

<script src="data/heat-map.js"></script>

<script>
// ── LOOKUP MAPS ──────────────────────────────────────────────────────────────
const pageMap = {};
const childMap = {};
const heatMap = {};
const personaMap = {};
const inboundLinks = {};

for (const p of SITEMAP.pages) {
  pageMap[p.id] = p;
  const parentKey = p.parent || '__root__';
  if (!childMap[parentKey]) childMap[parentKey] = [];
  childMap[parentKey].push(p);
}

for (const h of (HEAT_MAP?.pages || [])) {
  heatMap[h.id] = h;
}

for (const p of PERSONAS.personas) {
  personaMap[p.id] = p;
}

for (const page of SITEMAP.pages) {
  for (const cl of (page.crossLinks || [])) {
    if (!inboundLinks[cl.toId]) inboundLinks[cl.toId] = [];
    inboundLinks[cl.toId].push({ fromId: page.id, fromName: page.name, context: cl.context });
  }
}

// Maps persona conversionAction text (lower) → nav page id
const conversionTargetMap = {
  'request a demo':                  'nav-demo-request',
  'request demo':                    'nav-demo-request',
  'activate benefit':                'nav-member-login',
  'activate benefit / log in':       'nav-member-login',
  'log in':                          'nav-member-login',
  'member log in':                   'nav-member-login',
  'member login':                    'nav-member-login',
  'access provider portal':          'nav-provider-login',
  'provider login':                  'nav-provider-login',
  'admin login':                     'nav-admin-login',
  'submit provider inquiry':         'footer-contact',
  'connect with partnerships team':  'footer-contact',
  'connect with consultant relations': 'footer-contact',
  'submit inquiry':                  'footer-contact',
  'partner with us':                 'footer-contact',
  'contact us':                      'footer-contact',
};

function resolveConversionTarget(actionText) {
  if (!actionText) return null;
  const key = actionText.toLowerCase().trim();
  return conversionTargetMap[key] || null;
}

// ── JOURNEY STATE ─────────────────────────────────────────────────────────────
let activePersonaId = null;
let activeStoryIdx  = 0;
let activeStepIdx   = 0;
let journeyActive   = false;
let currentPageId   = 'home';
let jpCollapsed     = false;

function getActiveFlow() {
  if (!activePersonaId) return null;
  return FLOWS.flows.find(f => f.personaId === activePersonaId) || null;
}
function getActivePath() {
  const flow = getActiveFlow();
  if (!flow) return null;
  return flow.paths[activeStoryIdx] || null;
}

// ── NAVIGATE ──────────────────────────────────────────────────────────────────
function navigateTo(pageId) {
  const page = pageMap[pageId];
  if (!page) return;
  currentPageId = pageId;

  document.getElementById('wf-frame').innerHTML = renderWireframe(page);
  document.getElementById('wf-meta').innerHTML  = renderMetaPanel(page);
  updateTreeNav(pageId);
  if (journeyActive) updateJourneyStepIndicator();
  document.getElementById('wf-center').scrollTop = 0;

  try { history.pushState({ pageId }, '', '#' + pageId); } catch(e) {}
}

window.addEventListener('popstate', e => {
  const id = e.state?.pageId || location.hash.slice(1) || 'home';
  const page = pageMap[id];
  if (page) {
    currentPageId = id;
    document.getElementById('wf-frame').innerHTML = renderWireframe(page);
    document.getElementById('wf-meta').innerHTML  = renderMetaPanel(page);
    updateTreeNav(id);
    if (journeyActive) updateJourneyStepIndicator();
  }
});

// ── WIREFRAME RENDERING ───────────────────────────────────────────────────────
function renderWireframe(page) {
  const banner = journeyActive ? renderJourneyBanner() : '';

  if (page.type === 'nav-dropdown') return renderNavDropdownShell(page, banner);
  if (page.type === 'nav-cta' || page.type === 'footer-cta') return renderFormShell(page, banner);
  if (page.id === 'home') return renderHomeShell(page, banner);
  if (page.url && page.url.includes(':slug')) return renderDetailShell(page, banner);
  return renderContentShell(page, banner);
}

function renderChromeBar(page) {
  const crumbs = getBreadcrumb(page);
  const breadHtml = crumbs.map((c, i) => {
    if (i === crumbs.length - 1) return `<span class="crumb-current">${c.name}</span>`;
    return `<button onclick="navigateTo('${c.id}')">${c.name}</button><span class="sep">›</span>`;
  }).join('');
  const urlChip = page.url ? `<span class="wf-url-chip">${page.url}</span>` : '';
  return `
    <div class="wf-chrome">
      <div class="wf-breadcrumb">${breadHtml}</div>
      ${urlChip}
    </div>`;
}

function renderNavStrip(page) {
  const navDropdowns = (childMap['home'] || []).filter(p => p.type === 'nav-dropdown');
  const navItems = navDropdowns.map(n =>
    `<button class="wf-nav-item-btn" onclick="navigateTo('${n.id}')">${n.name}</button>`
  ).join('');
  return `
    <div class="wf-nav-strip">
      <div class="wf-nav-logo"></div>
      <div class="wf-nav-items">${navItems}</div>
      <div class="wf-nav-ctas-row">
        <button class="wf-btn wf-btn-ghost" onclick="navigateTo('nav-member-login')">Member Login</button>
        <button class="wf-btn wf-btn-primary" onclick="navigateTo('nav-demo-request')">Request a Demo</button>
      </div>
    </div>`;
}

  const pc = page.pageContent || {};
  const purpose = pc.purpose ? `<div class="wf-purpose-text">${pc.purpose}</div>` : '';

  const primaryCta = (pc.conversionActions || [])[0];

  const primaryCtaHtml = primaryCta
    ? (primaryCtaTarget && pageMap[primaryCtaTarget]
        ? `<button class="wf-btn wf-btn-primary wf-cta-btn" onclick="navigateTo('${primaryCtaTarget}')">${primaryCta} →</button>`

  const keyContent = pc.keyContent || [];
  const contentBlocksHtml = keyContent.length
    ? `<div class="wf-section">

          ${keyContent.slice(0, 6).map(item => `

  const crossLinks = (page.crossLinks || []).filter(cl => pageMap[cl.toId]);

    ? `<div class="wf-section">
        <div class="wf-section-label">Cross-Links From This Page</div>

          ${crossLinks.map(cl => {
            const target = pageMap[cl.toId];
            return `<button class="wf-crosslink-card" onclick="navigateTo('${cl.toId}')">

    : '';

  const remainingCtas = (pc.conversionActions || []).slice(1);

    ? `<div class="wf-section">

              ? `<button class="wf-btn wf-btn-ghost wf-cta-btn" onclick="navigateTo('${tgt}')">${action}</button>`
              : `<button class="wf-btn wf-btn-ghost wf-cta-btn" style="cursor:default">${action}</button>`;
          }).join('')}
        </div>
      </div>`
    : '';

  const subPages = (childMap[page.id] || []);
  const subPagesHtml = subPages.length
    ? `<div class="wf-section">
        <div class="wf-section-label">Sub-pages in This Section</div>
        <div class="wf-dropdown-grid">
          ${subPages.map(child => {
            const purpose = child.pageContent?.purpose || '';
            const truncated = purpose.length > 90 ? purpose.slice(0, 90) + '…' : purpose;
            return `<button class="wf-dropdown-child" onclick="navigateTo('${child.id}')">
              <div class="wf-dropdown-child-name">${child.name}</div>
              ${child.url ? `<div class="wf-dropdown-child-url">${child.url}</div>` : ''}
              ${truncated ? `<div class="wf-dropdown-child-purpose">${truncated}</div>` : ''}
            </button>`;
          }).join('')}
        </div>
      </div>`
    : '';

  const clusterCtas = (page.contentClusterCTAs || []).filter(c => pageMap[c.toId]);
  const clusterHtml = clusterCtas.length
    ? `<div class="wf-section">
        <div class="wf-section-label">Content Cluster CTAs (above footer)</div>
        <div class="wf-cluster-grid">
          ${clusterCtas.map(c => {
            const dest = pageMap[c.toId];
            return `<button class="wf-cluster-card" onclick="navigateTo('${c.toId}')">
              <div class="wf-cluster-label">${c.label || dest.name}</div>
              <div class="wf-cluster-dest">→ ${dest.name}</div>
            </button>`;

        </div>

    : '';

  return `<div class="wireframe-shell">
    ${banner}
    ${renderChromeBar(page)}
    ${renderNavStrip(page)}
    <div class="wf-section">
      <div class="wf-hero">

          <div class="wf-ph-stack" style="margin-bottom:14px">
            <div class="wf-ph wf-ph-round wf-text-ph-lg" style="width:95%"></div>

    ${subPagesHtml}
    ${crossLinksHtml}
    ${conversionHtml}
    ${clusterHtml}
    <div class="wf-footer"><div class="wf-footer-bar"></div></div>
  </div>`;
}

        </div>
        <div class="wf-cta-row">

// Journey banner (rendered at top of wireframe when journey active)
function renderJourneyBanner() {
  const path = getActivePath();
  if (!path) return '';
  const persona = personaMap[activePersonaId];
  const stepNum = activeStepIdx + 1;
  const totalSteps = path.path.length;
  const colorLight = persona?.colorLight || '#dbeafe';
  const color      = persona?.color      || '#1d4ed8';

  const prevPage = activeStepIdx > 0 ? path.path[activeStepIdx - 1] : null;
  const nextPage = activeStepIdx < path.path.length - 1 ? path.path[activeStepIdx + 1] : null;

  return `<div class="wf-journey-banner" style="background:${colorLight};border-color:${color};color:${color}">
    <span class="wf-journey-banner-persona">${persona?.icon || ''} ${persona?.shortName || activePersonaId} · Story ${activeStoryIdx + 1}</span>
    <span class="wf-journey-banner-step">Step ${stepNum} of ${totalSteps}</span>
    <span class="wf-journey-banner-jtbd">${path.jobToBeDone}</span>
    <div class="wf-journey-banner-nav">
      <button onclick="stepBack()" ${!prevPage ? 'disabled' : ''}>← ${prevPage ? prevPage.name : ''}</button>
      <button onclick="stepForward()" ${!nextPage ? 'disabled' : ''}>${nextPage ? nextPage.name : ''} →</button>
    </div>
  </div>`;
}

// ── META PANEL ────────────────────────────────────────────────────────────────
function renderMetaPanel(page) {
  const heat = heatMap[page.id];
  const heatLevel = heat?.heatLevel || null;
  const heatScore = heat?.heatScore != null ? heat.heatScore.toFixed(1) : null;

  const typeLabels = {
    'nav-dropdown': 'Nav Dropdown',
    'nav-cta': 'Nav CTA',
    'footer-cta': 'Footer CTA',
  };
  const typeBadge = page.type
    ? `<span class="badge badge-secondary" style="font-size:11px">${typeLabels[page.type] || page.type}</span>`
    : '';

  const heatHtml = heatScore
    ? `<div class="wf-heat-score ${heatLevel}">${heatScore}</div>
       <span class="badge badge-${heatLevel}">${heatLevel}</span>`
    : `<span style="color:var(--text-faint);font-size:13px">—</span>`;

  const tierLabel = ['Tier 0 — Homepage', 'Tier 1 — Top Nav', 'Tier 2 — Section', 'Tier 3 — Sub-page', 'Tier 4 — Detail'][page.navTier] || `Tier ${page.navTier}`;

  const pc = page.pageContent || {};

  const purposeHtml = pc.purpose
    ? `<div class="wf-meta-section">
        <div class="wf-meta-label">Purpose</div>
        <div class="wf-meta-purpose">${pc.purpose}</div>
      </div>`
    : '';

  const audienceHtml = (pc.primaryAudiences || []).length
    ? `<div class="wf-meta-section">
        <div class="wf-meta-label">Primary Audiences</div>
        <div class="wf-persona-pills-row">
          ${pc.primaryAudiences.map(pid => {
            const p = personaMap[pid];
            return p
              ? `<span class="wf-persona-pip" style="background:${p.colorLight};color:${p.color}">${p.icon} ${p.shortName || p.name}</span>`
              : `<span class="wf-persona-pip badge-secondary">${pid}</span>`;
          }).join('')}
        </div>
      </div>`
    : '';

  const toneHtml = pc.toneNote
    ? `<div class="wf-meta-section">
        <div class="wf-meta-label">Tone Note</div>
        <div class="wf-tone-note">${pc.toneNote}</div>
      </div>`
    : '';

  const journeyHtml = journeyActive ? renderJourneyInMeta(page) : '';

  const crossLinksHtml = (page.crossLinks || []).length
    ? `<div class="wf-meta-section">
        <div class="wf-meta-label">Cross-Links</div>
        ${page.crossLinks.map(cl => {
          const target = pageMap[cl.toId];
          return target
            ? `<button class="wf-meta-crosslink" onclick="navigateTo('${cl.toId}')">
                <span>→ ${target.name}</span>
               </button>`
            : '';
        }).filter(Boolean).join('')}
      </div>`
    : '';

  const clusterHtml = (page.contentClusterCTAs || []).length
    ? `<div class="wf-meta-section">
        <div class="wf-meta-label">Content Cluster CTAs</div>
        ${page.contentClusterCTAs.map(c => {
          const dest = pageMap[c.toId];
          return dest
            ? `<button class="wf-meta-cluster-row" onclick="navigateTo('${c.toId}')">
                <span>→</span><span>${dest.name}</span>
               </button>`
            : '';
        }).filter(Boolean).join('')}
      </div>`
    : '';

  return `
    <div class="wf-meta-page-name">${page.name}</div>
    ${page.url ? `<div class="wf-meta-url">${page.url}</div>` : ''}
    <div class="wf-meta-badges">
      ${heatHtml}
      ${typeBadge}
    </div>
    <div class="wf-meta-tier" style="font-size:11px;color:var(--text-faint)">${tierLabel}</div>
    ${journeyHtml}
    ${purposeHtml}
    ${audienceHtml}
    ${toneHtml}
    ${crossLinksHtml}
    ${clusterHtml}
  `;
}

function renderJourneyInMeta(page) {
  const path = getActivePath();
  if (!path) return '';
  const persona = personaMap[activePersonaId];
  const stepNum = activeStepIdx + 1;
  const totalSteps = path.path.length;
  const color = persona?.color || '#1d4ed8';
  const colorLight = persona?.colorLight || '#dbeafe';

  const prevPage = activeStepIdx > 0 ? path.path[activeStepIdx - 1] : null;
  const nextPage = activeStepIdx < path.path.length - 1 ? path.path[activeStepIdx + 1] : null;

  return `<div class="wf-meta-section">
    <div class="wf-journey-box" style="background:${colorLight}">
      <div class="wf-meta-label" style="color:${color}">In This Journey</div>
      <div style="font-size:12px;font-weight:600;color:${color};margin-bottom:4px">Step ${stepNum} of ${totalSteps}</div>
      <div class="wf-journey-jtbd-text">${path.jobToBeDone}</div>
      <div class="wf-journey-prevnext">
        ${prevPage ? `<button class="wf-journey-link" style="color:${color}" onclick="stepBack()">← ${prevPage.name}</button>` : ''}
        ${nextPage ? `<button class="wf-journey-link" style="color:${color}" onclick="stepForward()">${nextPage.name} →</button>` : ''}
        ${!nextPage ? `<span style="font-size:11px;color:${color};opacity:0.7;font-weight:600">✓ Conversion: ${path.conversionPage?.name || path.path[path.path.length-1].name}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// ── LEFT SIDEBAR ──────────────────────────────────────────────────────────────
function buildPersonaPills() {
  const container = document.getElementById('persona-pills');
  container.innerHTML = PERSONAS.personas.map(p =>
    `<button class="persona-pill-wf" id="pill-${p.id}"
             style="border-color:var(--border)"
             onclick="selectPersona('${p.id}')">${p.icon} ${p.shortName || p.name.split(' ')[0]}</button>`
  ).join('');
}

function selectPersona(personaId) {
  activePersonaId = personaId;
  activeStoryIdx  = 0;
  activeStepIdx   = 0;
  journeyActive   = true;

  // Update pill styles
  PERSONAS.personas.forEach(p => {
    const pill = document.getElementById('pill-' + p.id);
    if (!pill) return;
    if (p.id === personaId) {
      pill.style.background = p.color;
      pill.style.borderColor = p.color;
      pill.style.color = 'white';
    } else {
      pill.style.background = '';
      pill.style.borderColor = 'var(--border)';
      pill.style.color = '';
    }
  });

  buildStoryTabs(personaId);
  document.getElementById('story-tabs').classList.remove('hidden');
  document.getElementById('step-nav').classList.remove('hidden');
  document.getElementById('exit-journey').classList.remove('hidden');
  document.getElementById('tree-nav').classList.add('journey-active');

  const flow = FLOWS.flows.find(f => f.personaId === personaId);
  if (flow && flow.paths[0] && flow.paths[0].path[0]) {
    navigateTo(flow.paths[0].path[0].id);
  }
}

function buildStoryTabs(personaId) {
  const flow = FLOWS.flows.find(f => f.personaId === personaId);
  if (!flow) return;
  const container = document.getElementById('story-tabs');
  container.innerHTML = flow.paths.map((path, i) => {
    const jtbd = path.jobToBeDone.length > 55 ? path.jobToBeDone.slice(0, 55) + '…' : path.jobToBeDone;
    return `<button class="story-tab-wf ${i === 0 ? 'active' : ''}" id="story-tab-${i}"
                    onclick="selectStory(${i})">
              <span class="story-tab-num">${i + 1}</span>${jtbd}
            </button>`;
  }).join('');
}

function selectStory(idx) {
  activeStoryIdx = idx;
  activeStepIdx  = 0;

  document.querySelectorAll('.story-tab-wf').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const flow = FLOWS.flows.find(f => f.personaId === activePersonaId);
  if (flow && flow.paths[idx] && flow.paths[idx].path[0]) {
    navigateTo(flow.paths[idx].path[0].id);
  }
}

function exitJourney() {
  journeyActive   = false;
  activePersonaId = null;
  activeStoryIdx  = 0;
  activeStepIdx   = 0;

  PERSONAS.personas.forEach(p => {
    const pill = document.getElementById('pill-' + p.id);
    if (pill) { pill.style.background = ''; pill.style.borderColor = 'var(--border)'; pill.style.color = ''; }
  });

  document.getElementById('story-tabs').classList.add('hidden');
  document.getElementById('step-nav').classList.add('hidden');
  document.getElementById('exit-journey').classList.add('hidden');
  document.getElementById('tree-nav').classList.remove('journey-active');
  document.querySelectorAll('.tree-node-btn').forEach(el => {
    el.classList.remove('journey-member', 'journey-current');
  });

  // Re-render current page to remove banner
  const page = pageMap[currentPageId];
  if (page) {
    document.getElementById('wf-frame').innerHTML = renderWireframe(page);
    document.getElementById('wf-meta').innerHTML  = renderMetaPanel(page);
  }
}

function stepForward() {
  const path = getActivePath();
  if (!path || activeStepIdx >= path.path.length - 1) return;
  activeStepIdx++;
  navigateTo(path.path[activeStepIdx].id);
}

function stepBack() {
  if (activeStepIdx <= 0) return;
  activeStepIdx--;
  const path = getActivePath();
  if (path) navigateTo(path.path[activeStepIdx].id);
}

function updateJourneyStepIndicator() {
  const path = getActivePath();
  if (!path) return;

  // Find current page in path
  const idx = path.path.findIndex(p => p.id === currentPageId);
  if (idx !== -1) activeStepIdx = idx;

  const stepNum    = activeStepIdx + 1;
  const totalSteps = path.path.length;
  const pageName   = path.path[activeStepIdx]?.name || '';

  document.getElementById('step-info').textContent = `Step ${stepNum}/${totalSteps}: ${pageName}`;
  document.getElementById('btn-prev').disabled = activeStepIdx === 0;
  document.getElementById('btn-next').disabled = activeStepIdx === totalSteps - 1;

  // Update tree journey highlighting
  const pathIds = new Set(path.path.map(p => p.id));
  document.querySelectorAll('.tree-node-btn').forEach(el => {
    const id = el.dataset.id;
    el.classList.toggle('journey-member',  pathIds.has(id) && id !== currentPageId);
    el.classList.toggle('journey-current', id === currentPageId);
  });

  // Update story tab active state
  document.querySelectorAll('.story-tab-wf').forEach((el, i) => {
    el.classList.toggle('active', i === activeStoryIdx);
  });
}

// Toggle journey panel collapse
function toggleJourneyPanel() {
  jpCollapsed = !jpCollapsed;
  document.getElementById('jp-body').classList.toggle('hidden', jpCollapsed);
  document.getElementById('jp-toggle').classList.toggle('collapsed', jpCollapsed);
}

// ── TREE NAV ──────────────────────────────────────────────────────────────────
function buildTreeNav() {
  const treeNav = document.getElementById('tree-nav');
  treeNav.innerHTML = buildTreeLevel('home', 0);
}

function buildTreeLevel(pageId, depth) {
  const page = pageMap[pageId];
  if (!page) return '';

  const children = childMap[pageId] || [];
  const isCta = page.type === 'nav-cta' || page.type === 'footer-cta';
  const isDropdown = page.type === 'nav-dropdown';
  const pad = depth * 12;

  let html = '';

  if (isDropdown) {
    // Section header (non-clickable)
    html += `<li class="tree-section-header">${page.name}</li>`;
    // Render its children
    for (const child of children) {
      html += buildTreeLevel(child.id, depth + 1);
    }
    return html;
  }

  // Clickable page
  const ctaBadge = isCta ? `<span class="tree-cta-badge">CTA</span>` : '';
  html += `<li>
    <button class="tree-node-btn" data-id="${page.id}"
            style="padding-left:${14 + pad}px"
            onclick="navigateTo('${page.id}')">
      <span>${page.name}</span>
      ${ctaBadge}
    </button>
  </li>`;

  // Render children (only if not a CTA)
  if (!isCta) {
    for (const child of children) {
      html += buildTreeLevel(child.id, depth + 1);
    }
  }

  return html;
}

function updateTreeNav(activePageId) {
  document.querySelectorAll('.tree-node-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === activePageId);
  });
  const activeBtn = document.querySelector(`.tree-node-btn[data-id="${activePageId}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── UTILITIES ─────────────────────────────────────────────────────────────────
function getBreadcrumb(page) {
  const crumbs = [];
  let current = page;
  while (current) {
    crumbs.unshift({ id: current.id, name: current.name });
    current = current.parent ? pageMap[current.parent] : null;
  }
  return crumbs;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildPersonaPills();
buildTreeNav();

const initialPageId = location.hash.slice(1) || 'home';
navigateTo(pageMap[initialPageId] ? initialPageId : 'home');
</script>
